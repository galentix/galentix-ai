<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BBF9E"/>
      <stop offset="100%" style="stop-color:#4aab89"/>
    </linearGradient>
  </defs>
  
  <!-- Brain outline -->
  <path 
    d="M50 10 
       C70 10, 85 25, 85 45 
       C85 55, 80 65, 72 72 
       C68 76, 65 80, 65 85 
       L65 90 
       L35 90 
       L35 85 
       C35 80, 32 76, 28 72 
       C20 65, 15 55, 15 45 
       C15 25, 30 10, 50 10 Z"
    fill="none"
    stroke="url(#brainGradient)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Brain details / folds -->
  <path 
    d="M35 30 Q50 35, 65 30"
    fill="none"
    stroke="url(#brainGradient)"
    stroke-width="3"
    stroke-linecap="round"
  />
  
  <path 
    d="M30 45 Q50 50, 70 45"
    fill="none"
    stroke="url(#brainGradient)"
    stroke-width="3"
    stroke-linecap="round"
  />
  
  <path 
    d="M32 60 Q50 65, 68 60"
    fill="none"
    stroke="url(#brainGradient)"
    stroke-width="3"
    stroke-linecap="round"
  />
  
  <!-- Neural nodes -->
  <circle cx="30" cy="35" r="4" fill="#6BBF9E"/>
  <circle cx="70" cy="35" r="4" fill="#6BBF9E"/>
  <circle cx="50" cy="50" r="5" fill="#6BBF9E"/>
  <circle cx="35" cy="65" r="4" fill="#6BBF9E"/>
  <circle cx="65" cy="65" r="4" fill="#6BBF9E"/>
  
  <!-- Star/sparkle in center -->
  <path 
    d="M50 42 L52 48 L58 50 L52 52 L50 58 L48 52 L42 50 L48 48 Z"
    fill="#ffffff"
    stroke="#6BBF9E"
    stroke-width="1"
  />
</svg>
